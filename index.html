<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
    <meta name="theme-color" content="#0b0b0b" />
    <meta name="description" content="Afinador de violão, guitarra, ukulele e baixo pelo microfone do celular." />

    <!-- Frame-busting: se o app foi embutido num iframe (ex.: moldura de
         "device" de um visualizador), assume a janela inteira para o site
         aparecer sem moldura. Funciona quando o pai é da MESMA origem; em
         visualizadores cross-origin o navegador bloqueia (vira no-op). Não
         dispara em localhost para preservar o preview de desenvolvimento. -->
    <script>
      ;(function () {
        try {
          var host = location.hostname
          var isLocal = host === 'localhost' || host === '127.0.0.1' || host === ''
          if (!isLocal && window.top && window.self !== window.top) {
            window.top.location.replace(window.self.location.href)
          }
        } catch (e) {
          /* pai cross-origin — o navegador impede escapar do iframe */
        }
      })()
    </script>

    <!-- Aplica o tema antes da primeira pintura para evitar flash (FOUC). -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('afinador:theme') || 'system'
          var dark =
            t === 'dark' ||
            (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
          document.documentElement.style.background = dark ? '#0b0b0b' : '#ffffff'
        } catch (e) {}
      })()
    </script>

    <!-- Ícones (relativos ao base path para funcionar no GitHub Pages e no Capacitor) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <!-- PWA / iOS standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Afinador" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Fontes (Inter substitui o sans proprietário do DESIGN.md; IBM Plex Mono para rótulos técnicos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Afinador</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

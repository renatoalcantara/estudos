name: Deploy Afinador (GitHub Pages)

# Publica o app em https://renatoalcantara.github.io/estudos/afinador/
# IMPORTANTE (passo manual único): em Settings → Pages → "Build and deployment"
# defina Source = "GitHub Actions". Sem isso o job de deploy falha.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Monta o site de modo que o app fique em /estudos/afinador/ e a raiz
      # /estudos/ apenas redirecione para ele.
      - name: Montar artefato do Pages
        run: |
          mkdir -p site/afinador
          cp -r dist/* site/afinador/
          cp pages-root-redirect.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
